name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Get version from package.json
        id: version
        run: echo "version=v$(bun -e 'console.log(require("./package.json").version)')" >> $GITHUB_OUTPUT

      - run: bun install

      - run: bun run build

      - name: Package plugin
        run: |
          mkdir -p package
          cp -r dist manifest.json res package/
          cd package && zip -r ../LiteLoaderQQNT-i18n.zip .

      - name: Delete existing release and tag
        run: |
          gh release delete ${{ steps.version.outputs.version }} --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          files: LiteLoaderQQNT-i18n.zip
          generate_release_notes: true
